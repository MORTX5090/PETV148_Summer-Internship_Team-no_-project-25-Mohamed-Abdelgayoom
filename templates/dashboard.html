<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Scan History</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS (Global Cyber Theme) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>

    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar cyber-nav mb-5">
        <div class="container-fluid px-5">
            <a class="cyber-brand" href="/">
                <i class="bi bi-shield-check shield-icon"></i>
                SECURITY HARDENER
            </a>
            <div>
                <a href="/" class="btn btn-outline-info btn-sm rounded-pill px-4 me-2">
                    <i class="bi bi-house me-1"></i> Home
                </a>
                <!-- زر تسجيل الخروج تمت إضافته هنا -->
                <a href="/logout" class="btn btn-outline-danger btn-sm rounded-pill px-4">
                    <i class="bi bi-box-arrow-right me-1"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <!-- Admin History Content -->
    <div class="container pb-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-white mb-0"><i class="bi bi-server me-2 text-info"></i> Full Scan History</h2>
            <span class="badge bg-secondary text-light px-3 py-2 rounded-pill">Admin Access Only</span>
        </div>

        <div class="glass-panel overflow-hidden">
            <div class="table-responsive">
                <table class="table admin-table mb-0">
                    <thead>
                        <tr>
                            <th class="p-3"># ID</th>
                            <th class="p-3">Target URL</th>
                            <th class="p-3 text-center">Score</th>
                            <th class="p-3 text-center">Grade</th>
                            <th class="p-3">Date (UTC)</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for row in stats.admin_history %}
                        <tr>
                            <td class="p-3 text-white-50">{{ row.id }}</td>
                            <td class="p-3 fw-bold"><a href="{{ row.url }}" target="_blank"
                                    class="text-info text-decoration-none">{{ row.url }}</a></td>
                            <td class="p-3 text-center">{{ row.score }}/100</td>
                            <td class="p-3 text-center">
                                <span
                                    class="badge {% if row.grade in ['A+', 'A'] %}bg-success{% elif row.grade in ['B', 'C'] %}bg-warning{% else %}bg-danger{% endif %} px-2 py-1">
                                    {{ row.grade }}
                                </span>
                            </td>
                            <td class="p-3 text-white-50" style="font-size: 0.9rem;">{{ row.scan_date }}</td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="5" class="text-center p-4">No scans recorded yet.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

    </div>

</body>

</html>
