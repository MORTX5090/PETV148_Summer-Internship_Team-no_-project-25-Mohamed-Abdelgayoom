<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP Security Headers Hardener</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="scanner-card">

        <h1>HTTP Security Headers Hardener</h1>

        <p class="subtitle">
            Scan any website and check whether it follows HTTP Security Header best practices.
        </p>

        <form action="/scan" method="POST">

            <input
                type="text"
                class="form-control form-control-lg"
                name="url"
                placeholder="https://example.com"
                required>

            <button class="btn btn-primary btn-lg mt-4 w-100">
                Scan Website
            </button>

        </form>

    </div>

</div>

</body>
</html>
